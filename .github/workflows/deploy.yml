name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build Blazor WASM & Deploy to Cloudflare Pages

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup .NET 9 ──────────────────────────────────────
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ── 3. Restore NuGet packages ─────────────────────────────
      - name: Restore dependencies
        run: dotnet restore

      # ── 4. Publish Blazor WASM ────────────────────────────────
      - name: Publish
        run: dotnet publish -c Release -o publish

      # ── 5. Create 404.html for SPA routing ───────────────────
      # Cloudflare Pages serves 404.html for any unmatched path,
      # giving Blazor WASM the client-side routing fallback it needs.
      - name: Create 404.html for SPA routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      # ── 6. Deploy to Cloudflare Pages ─────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy publish/wwwroot --project-name=staff-attendance-management-system --commit-dirty=true
